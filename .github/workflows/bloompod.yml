name: Update ISD Chatbot BloomPod

on:
  push:
    branches:
      - bloompod

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy isd_chatbot to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BLOOMPOD_HOST }}
          username: ${{ secrets.BLOOMPOD_USERNAME }}
          key: ${{ secrets.BLOOMPOD_SSH_KEY }}
          script_stop: true
          script: |
            # Clone if not exists, otherwise update
            if [ ! -d ~/addons-system/isd_chatbot ]; then
              git clone git@github.com:IntelliSync-data/isd_chatbot.git ~/addons-system/isd_chatbot
              cd ~/addons-system/isd_chatbot && git checkout bloompod
            else
              cd ~/addons-system/isd_chatbot
              git fetch origin && git reset --hard origin/bloompod
            fi

            # Sync isd_chatbot directory with rsync (including deletions)
            sudo mkdir -p ~/custom-addons/isd_chatbot
            sudo rsync -av --delete \
              --exclude='views/menu_items_override.xml.*' \
              --exclude='__manifest__.py.*' \
              ~/addons-system/isd_chatbot/ ~/custom-addons/isd_chatbot/

      - name: Update isd_chatbot Module
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BLOOMPOD_HOST }}
          username: ${{ secrets.BLOOMPOD_USERNAME }}
          key: ${{ secrets.BLOOMPOD_SSH_KEY }}
          script: |
            echo "Updating apps list..."
            echo "env['ir.module.module'].update_list(); env.cr.commit()" | sudo -u odoo /odoo-venv/bin/python /odoo18/odoo-bin shell -c /odoo.conf -d ${{ secrets.BLOOMPOD_DB_NAME }} --no-http
            echo "Updating isd_chatbot module..."
            sudo -u odoo /odoo-venv/bin/python /odoo18/odoo-bin -c /odoo.conf -d ${{ secrets.BLOOMPOD_DB_NAME }} -u isd_chatbot --stop-after-init --no-http || \
              echo "Module not installed yet (now visible in Apps list), continuing..."

      - name: Restart Odoo Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BLOOMPOD_HOST }}
          username: ${{ secrets.BLOOMPOD_USERNAME }}
          key: ${{ secrets.BLOOMPOD_SSH_KEY }}
          script: |
            sudo systemctl restart odoo

      - name: Verify Odoo Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BLOOMPOD_HOST }}
          username: ${{ secrets.BLOOMPOD_USERNAME }}
          key: ${{ secrets.BLOOMPOD_SSH_KEY }}
          script: |
            sleep 5
            if sudo systemctl is-active --quiet odoo; then
              echo "Odoo restarted successfully"
            else
              echo "Odoo failed to restart"
              echo "=== systemctl status ==="
              sudo systemctl status odoo --no-pager
              echo "=== Last 50 lines of Odoo log ==="
              sudo tail -n 50 /var/log/odoo/odoo.log
              exit 1
            fi
